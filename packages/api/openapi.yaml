openapi: 3.1.0

info:
  title: KULTIVAR API
  version: 1.0.0
  description: |
    REST API for the KULTIVAR habit tracker.

    **Auth:** HttpOnly cookies (`accessToken`, `refreshToken`). Use `credentials: "include"` on all requests.

    **Status:** Auth endpoints are implemented. Profile, Life Areas, Habits, and Check-ins are documented for team review — not yet implemented on the server.

servers:
  - url: /api
    description: Default server

tags:
  - name: Auth
    description: Authentication and session management
  - name: Profile
    description: User profile and onboarding
  - name: Life Areas
    description: Life area categories that group habits
  - name: Habits
    description: Habits within life areas
  - name: Check-ins
    description: Daily habit completion records

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
      description: HttpOnly access token cookie set on login

  schemas:
    RegisterBody:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          description: Must contain at least one uppercase letter and one number
          example: Password1
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Jane Doe

    LoginBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 1
          example: Password1

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [user, admin]
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Profile:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
          readOnly: true
        age:
          type: integer
          minimum: 1
          maximum: 120
          nullable: true
        jobTitle:
          type: string
          maxLength: 100
          nullable: true
        goals:
          type: array
          maxItems: 10
          items:
            type: string
            maxLength: 200
        stressLevel:
          type: integer
          minimum: 1
          maximum: 10
          nullable: true
        sleepHours:
          type: number
          minimum: 0
          maximum: 24
          nullable: true
        onboarded:
          type: boolean
        updatedAt:
          type: string
          format: date-time

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        age:
          type: integer
          minimum: 1
          maximum: 120
        jobTitle:
          type: string
          maxLength: 100
        goals:
          type: array
          maxItems: 10
          items:
            type: string
            maxLength: 200
        stressLevel:
          type: integer
          minimum: 1
          maximum: 10
        sleepHours:
          type: number
          minimum: 0
          maximum: 24

    OnboardingBody:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        age:
          type: integer
          minimum: 1
          maximum: 120
        jobTitle:
          type: string
          maxLength: 100
        goals:
          type: array
          maxItems: 10
          items:
            type: string
            maxLength: 200
        stressLevel:
          type: integer
          minimum: 1
          maximum: 10
        sleepHours:
          type: number
          minimum: 0
          maximum: 24

    AreaColor:
      type: string
      enum: [health, career, spirit, social, learning, creative]

    LifeArea:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 50
        color:
          $ref: "#/components/schemas/AreaColor"
        description:
          type: string
          maxLength: 300
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    HabitSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        frequency:
          $ref: "#/components/schemas/Frequency"
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    LifeAreaWithHabits:
      allOf:
        - $ref: "#/components/schemas/LifeArea"
        - type: object
          properties:
            habits:
              type: array
              items:
                $ref: "#/components/schemas/HabitSummary"

    CreateLifeAreaBody:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        color:
          $ref: "#/components/schemas/AreaColor"
        description:
          type: string
          maxLength: 300

    UpdateLifeAreaBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        color:
          $ref: "#/components/schemas/AreaColor"
        description:
          type: string
          maxLength: 300
          nullable: true

    Frequency:
      type: string
      enum: [daily, weekdays, 3x, 5x, weekly]

    Habit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        areaId:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        frequency:
          $ref: "#/components/schemas/Frequency"
        notes:
          type: string
          maxLength: 500
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateHabitBody:
      type: object
      required: [areaId, name, frequency]
      properties:
        areaId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        frequency:
          $ref: "#/components/schemas/Frequency"
        notes:
          type: string
          maxLength: 500

    UpdateHabitBody:
      type: object
      properties:
        areaId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        frequency:
          $ref: "#/components/schemas/Frequency"
        notes:
          type: string
          maxLength: 500
          nullable: true

    CheckIn:
      type: object
      properties:
        id:
          type: string
          format: uuid
        habitId:
          type: string
          format: uuid
        date:
          type: string
          format: date
          example: "2024-06-26"
        createdAt:
          type: string
          format: date-time

    CreateCheckInBody:
      type: object
      required: [habitId, date]
      properties:
        habitId:
          type: string
          format: uuid
        date:
          type: string
          format: date
          description: Cannot be a future date

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid credentials

    MessageResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            message:
              type: string
              example: Success

    ValidationErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
              message:
                type: string
                example: Invalid email address

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      description: Does not set auth cookies. Call POST /auth/login after registering.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive auth cookies
      operationId: login
      description: >
        On success, sets HttpOnly cookies: accessToken (15 min) and refreshToken (7 days).
        Include credentials on all requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh the access token
      operationId: refreshToken
      description: Reads the refreshToken cookie and issues new auth cookies.
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Missing or invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Missing refresh token

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and clear auth cookies
      operationId: logout
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the current authenticated user
      operationId: getMe
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profile:
    get:
      tags: [Profile]
      summary: Get user profile
      operationId: getProfile
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: [Profile]
      summary: Update user profile
      operationId: updateProfile
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /profile/onboarding:
    patch:
      tags: [Profile]
      summary: Complete onboarding
      operationId: completeOnboarding
      description: Saves onboarding data and sets onboarded to true.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingBody"
      responses:
        "200":
          description: Onboarding complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /areas:
    get:
      tags: [Life Areas]
      summary: List life areas
      operationId: listAreas
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of life areas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LifeArea"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags: [Life Areas]
      summary: Create a life area
      operationId: createArea
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLifeAreaBody"
      responses:
        "201":
          description: Life area created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LifeArea"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /areas/{id}:
    get:
      tags: [Life Areas]
      summary: Get a life area with its habits
      operationId: getArea
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Life area with habits
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LifeAreaWithHabits"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Area not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: [Life Areas]
      summary: Update a life area
      operationId: updateArea
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLifeAreaBody"
      responses:
        "200":
          description: Updated life area
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LifeArea"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Area not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

    delete:
      tags: [Life Areas]
      summary: Delete a life area
      operationId: deleteArea
      description: Cascade-deletes all habits and check-ins in this area.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Area not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /habits:
    get:
      tags: [Habits]
      summary: List habits
      operationId: listHabits
      security:
        - cookieAuth: []
      parameters:
        - name: areaId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by life area
      responses:
        "200":
          description: List of habits
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Habit"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags: [Habits]
      summary: Create a habit
      operationId: createHabit
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHabitBody"
      responses:
        "201":
          description: Habit created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Habit"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Area not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /habits/{id}:
    get:
      tags: [Habits]
      summary: Get a habit
      operationId: getHabit
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Habit
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Habit"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Habit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: [Habits]
      summary: Update a habit
      operationId: updateHabit
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHabitBody"
      responses:
        "200":
          description: Updated habit
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Habit"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Habit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

    delete:
      tags: [Habits]
      summary: Delete a habit
      operationId: deleteHabit
      description: Cascade-deletes all check-ins for this habit.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Habit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /check-ins:
    get:
      tags: [Check-ins]
      summary: List check-ins
      operationId: listCheckIns
      description: Returns last 30 days if no date range is provided.
      security:
        - cookieAuth: []
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date (inclusive)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date (inclusive)
        - name: habitId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by habit
      responses:
        "200":
          description: List of check-ins
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CheckIn"
        "400":
          description: Invalid date range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags: [Check-ins]
      summary: Create a check-in
      operationId: createCheckIn
      description: Idempotent — returns 200 if check-in already exists for habitId + date.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckInBody"
      responses:
        "200":
          description: Check-in already existed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CheckIn"
        "201":
          description: Check-in created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CheckIn"
        "400":
          description: Future date not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Habit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /check-ins/today:
    get:
      tags: [Check-ins]
      summary: Get today's check-ins
      operationId: getTodayCheckIns
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Today's check-ins
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CheckIn"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /check-ins/{id}:
    delete:
      tags: [Check-ins]
      summary: Delete a check-in
      operationId: deleteCheckIn
